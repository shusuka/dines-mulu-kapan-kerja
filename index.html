const I = {

/* ── UTILS ── */
const rp  = (n) => n ? 'Rp ' + Number(n).toLocaleString('id-ID') : 'Rp 0';
const uid = () => Math.random().toString(36).slice(2, 11);
const calcTotal = (b) => {
  if (!b) return 0;
  return (+b.transportasiPergi?.taksi||0) + (+b.transportasiPergi?.tol||0)
       + (+b.transportasiPulang?.taksi||0) + (+b.transportasiPulang?.tol||0)
       + (b.penginapan||[]).reduce((s,v)=>s+(+v||0),0)
       + (+b.tiket?.pergi||0) + (+b.tiket?.pulang||0)
       + (b.tambahanLain||[]).reduce((s,v)=>s+(+v?.jumlah||0),0);
};
const HARI  = ['Hari Pertama','Hari Kedua','Hari Ketiga','Hari Keempat','Hari Kelima','Hari Keenam','Hari Ketujuh'];
const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const formatPeriode = (from, to) => {
  if (!from) return '';
  const d1 = new Date(from + 'T00:00:00');
  const [tgl1, bln1, thn] = [d1.getDate(), BULAN[d1.getMonth()], d1.getFullYear()];
  if (!to) return `${tgl1} ${bln1} ${thn}`;
  const d2 = new Date(to + 'T00:00:00');
  const [tgl2, bln2] = [d2.getDate(), BULAN[d2.getMonth()]];
  return bln1 === bln2 ? `${tgl1}–${tgl2} ${bln1} ${thn}` : `${tgl1} ${bln1} – ${tgl2} ${bln2} ${thn}`;
};
const getPeriode = (trip) => trip.periodeFrom ? formatPeriode(trip.periodeFrom, trip.periodeTo) : (trip.periode || '');
const DOK_ITEMS = [
  { key: 'suratUndangan',      label: 'Surat Undangan',                side: 'L' },
  { key: 'suratPerintahTugas', label: 'Surat Perintah Tugas',          side: 'L' },
  { key: 'laporanPerjalanan',  label: 'Laporan Perjalanan Dinas',       side: 'L' },
  { key: 'dokumentasiPergi',   label: 'Dokumentasi Perjalanan Dinas',   side: 'L' },
  { key: 'buktiPenginapan',    label: 'Penginapan',                     side: 'R' },
  { key: 'strukTaksi',         label: 'Struk Taksi / Bon Bensin',       side: 'R' },
  { key: 'strukTol',           label: 'Struk Tol',                      side: 'R' },
  { key: 'dokumentasiBukti',   label: 'Dokumentasi Perjalanan (Bukti)', side: 'R' },
];
const BLANK_DOK  = Object.fromEntries(DOK_ITEMS.map(d => [d.key, false]));
const BLANK_FORM = {
  nama: '', periodeFrom: '', periodeTo: '', kotaTujuan: '', status: 'proses',
  catatan: 'Semua biaya perjalanan dinas wajib melampirkan bukti dukung',
  dokumen: { ...BLANK_DOK },
  biaya: { transportasiPergi: { taksi: 0, tol: 0 }, transportasiPulang: { taksi: 0, tol: 0 }, penginapan: [0], tiket: { pergi: 0, pulang: 0 }, tambahanLain: [] },
};
const SEED = [
  {
    id: uid(), nama: 'Akram Yonda Putra, S.T', periodeFrom: '2026-05-18', periodeTo: '2026-05-21',
    kotaTujuan: 'Dinas PU Provinsi Sumatera Selatan', status: 'selesai',
    catatan: 'Semua biaya perjalanan dinas wajib melampirkan bukti dukung',
    dokumen: { suratUndangan:true, suratPerintahTugas:true, laporanPerjalanan:true, dokumentasiPergi:true, buktiPenginapan:true, strukTaksi:true, strukTol:false, dokumentasiBukti:true },
    biaya: { transportasiPergi:{taksi:211000,tol:0}, transportasiPulang:{taksi:238000,tol:0}, penginapan:[850000,850000,850000], tiket:{pergi:1338440,pulang:1379870}, tambahanLain:[] },
    createdAt: new Date().toISOString(),
  },
  {
    id: uid(), nama: 'Amiruddin Yusuf, S.E, M.Ak', periodeFrom: '2026-05-18', periodeTo: '2026-05-21',
    kotaTujuan: 'Dinas PU Provinsi Sumatera Selatan', status: 'selesai',
    catatan: 'Semua biaya perjalanan dinas wajib melampirkan bukti dukung',
    dokumen: { suratUndangan:true, suratPerintahTugas:true, laporanPerjalanan:true, dokumentasiPergi:true, buktiPenginapan:true, strukTaksi:true, strukTol:false, dokumentasiBukti:true },
    biaya: { transportasiPergi:{taksi:245000,tol:0}, transportasiPulang:{taksi:244760,tol:0}, penginapan:[850000,850000,850000], tiket:{pergi:1338440,pulang:1379870}, tambahanLain:[] },

/* ── DASHBOARD ── */
const Dashboard = ({ data, go }) => {
  const total   = data.reduce((s,d) => s + calcTotal(d.biaya), 0);
  const selesai = data.filter(d => d.status === 'selesai').length;
  const avg     = data.length ? Math.round(total / data.length) : 0;

  const stats = [
    { label:'Total Perjalanan', val:`${data.length} trip`, Icon:I.Plane,   g:'from-sky-500 to-blue-500',     bg:'bg-sky-50',     txt:'text-sky-600'     },
    { label:'Total Biaya',      val:rp(total),             Icon:I.Wallet,  g:'from-violet-500 to-purple-500', bg:'bg-violet-50',  txt:'text-violet-600'  },
    { label:'Sudah Selesai',    val:`${selesai} trip`,     Icon:I.Check,   g:'from-emerald-500 to-teal-500', bg:'bg-emerald-50', txt:'text-emerald-600' },
    { label:'Rata-rata Biaya',  val:rp(avg),               Icon:I.TrendUp, g:'from-amber-500 to-orange-400', bg:'bg-amber-50',   txt:'text-amber-600'   },
  ];

  const cats = [
    { icon:'🚗', label:'Transport Pergi',  val: data.reduce((s,d)=>s+(+d.biaya?.transportasiPergi?.taksi||0)+(+d.biaya?.transportasiPergi?.tol||0),0) },
    { icon:'🏠', label:'Transport Pulang', val: data.reduce((s,d)=>s+(+d.biaya?.transportasiPulang?.taksi||0)+(+d.biaya?.transportasiPulang?.tol||0),0) },
    { icon:'🏨', label:'Penginapan',       val: data.reduce((s,d)=>s+(d.biaya?.penginapan||[]).reduce((a,v)=>a+(+v||0),0),0) },
    { icon:'✈️', label:'Tiket',            val: data.reduce((s,d)=>s+(+d.biaya?.tiket?.pergi||0)+(+d.biaya?.tiket?.pulang||0),0) },
  ];

  return (
    <div className="animate-slidein space-y-6">
      {/* Hero */}
      <div className="relative overflow-hidden rounded-2xl bg-gradient-to-br from-sky-500 via-sky-600 to-indigo-600 p-8 text-white shadow-lg shadow-sky-200">
        <div className="relative z-10">
          <p className="text-sky-100 text-sm font-medium mb-1">Sistem Manajemen</p>
          <h1 className="text-3xl font-extrabold leading-tight mb-2">Dines Mulu<br/>Kapan Kerja? 🛫</h1>
          <p className="text-sky-100/80 text-sm max-w-sm mb-5">Kelola rincian biaya & kelengkapan berkas perjalanan dinas PFID secara mudah.</p>
          <button onClick={() => go({ name:'form' })}
            className="inline-flex items-center gap-2 bg-white text-sky-600 font-bold text-sm px-5 py-2.5 rounded-xl hover:bg-sky-50 transition shadow-md">
            <I.Plus c="w-4 h-4" /> Tambah Perjalanan
          </button>
        </div>
        <div className="absolute right-6 top-1/2 -translate-y-1/2 opacity-10 pointer-events-none">
          <I.Plane c="w-48 h-48 text-white animate-float" />
        </div>
        <div className="absolute right-32 top-3 w-20 h-20 rounded-full bg-white/10 pointer-events-none" />
        <div className="absolute left-1/2 bottom-0 w-32 h-16 rounded-t-full bg-white/5 pointer-events-none" />
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-4">
        {stats.map(({ label, val, Icon, g, bg, txt }) => (
          <div key={label} className="card p-5 shadow-sm">
            <div className={`w-10 h-10 rounded-xl bg-gradient-to-br ${g} flex items-center justify-center mb-3 shadow-md`}>
              <Icon c="w-5 h-5 text-white" />
            </div>
            <div className="text-lg font-bold text-gray-800 leading-tight">{val}</div>
            <div className="text-xs text-gray-400 mt-0.5">{label}</div>
          </div>
        ))}
      </div>

      {/* Category breakdown */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
        {cats.map(({ icon, label, val }) => (
          <div key={label} className="card px-4 py-3.5 flex items-center gap-3 shadow-sm">

/* ── FORM HELPERS — harus di luar TripForm agar fokus input tidak hilang saat re-render ── */
const inputCls = "w-full bg-white border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-700 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-300 transition";
const FLbl = ({ children }) => <label className="block text-[11px] font-semibold text-gray-500 mb-1 uppercase tracking-wide">{children}</label>;
const NumericInput = ({ value, onChange, className }) => {
  const [focused, setFocused] = React.useState(false);
  const displayVal = focused
    ? (value ? String(value) : '')
    : (value ? Number(value).toLocaleString('id-ID') : '');
  return (
    <input type="text" value={displayVal}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      onChange={e => { const raw = e.target.value.replace(/[^0-9]/g,''); onChange(raw ? +raw : 0); }}
      className={className} />
  );
};
const FNumIn = ({ label, value, onChange }) => (
  <div>
    {label && <FLbl>{label}</FLbl>}
    <div className="relative">
      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs font-medium">Rp</span>
      <NumericInput value={value} onChange={onChange}
        className="w-full bg-white border border-gray-300 rounded-lg pl-8 pr-3 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-sky-300 transition" />
    </div>
  </div>
);
const FChk = ({ checked, onChange, label }) => (
  <label className="flex items-center gap-2.5 cursor-pointer group select-none">
    <div onClick={onChange}
      className={`w-5 h-5 rounded-md flex items-center justify-center border-2 transition-all flex-shrink-0
        ${checked ? 'bg-sky-500 border-sky-500 shadow-sm shadow-sky-300' : 'border-gray-300 bg-white group-hover:border-sky-400'}`}>
      {checked && <I.Check c="w-3 h-3 text-white" />}
    </div>
    <span className="text-sm text-gray-600 group-hover:text-gray-800 transition">{label}</span>
  </label>
);
const FCard = ({ title, children }) => (
  <div className="card p-5 shadow-sm space-y-4">
    {title && <h3 className="font-semibold text-gray-700 text-sm border-b border-gray-100 pb-3">{title}</h3>}
    {children}
  </div>
);
const FSub = ({ label, children }) => (
  <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 space-y-3">
    <div className="text-xs font-bold text-gray-500 uppercase tracking-wider">{label}</div>
    {children}
  </div>
);

/* ── FORM ── */
const TripForm = ({ data, id, onSave, go }) => {
  const existing = id ? data.find(d => d.id === id) : null;
  const [form, setForm] = useState(() =>
    existing ? JSON.parse(JSON.stringify(existing))
             : JSON.parse(JSON.stringify({ ...BLANK_FORM, id: uid(), createdAt: new Date().toISOString() }))
  );

  const set = (path, val) => setForm(prev => {
    const next = JSON.parse(JSON.stringify(prev));
    const parts = path.split('.');
    let cur = next;
    for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
    cur[parts[parts.length - 1]] = val;
    return next;
  });

  const totalBiaya = calcTotal(form.biaya);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.nama.trim() || (!form.periodeFrom && !form.periode) || !form.kotaTujuan.trim()) {
      alert('Nama, Periode, dan Kota Tujuan wajib diisi!');
      return;
    }
    onSave(form);
    go({ name:'list' });
  };


  return (
    <div className="animate-slidein max-w-2xl space-y-4 pb-10">
      <div className="flex items-center gap-3 mb-2">
        <button onClick={() => go({ name:'list' })}

        {/* Info */}

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div className="md:col-span-2">
              <FLbl>Nama Lengkap *</FLbl>
              <input type="text" value={form.nama} onChange={e=>set('nama',e.target.value)} placeholder="Nama + Gelar" className={inputCls} />
            </div>
            <div>
              <FLbl>Periode *</FLbl>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <div className="text-[10px] text-gray-400 mb-1">Tanggal Mulai</div>

            <div>
              <FLbl>Status</FLbl>
              <select value={form.status} onChange={e=>set('status',e.target.value)} className={inputCls}>
                <option value="proses">⏳ Proses</option>

            </div>
            <div className="md:col-span-2">
              <FLbl>Kota / Instansi Tujuan *</FLbl>
              <input type="text" value={form.kotaTujuan} onChange={e=>set('kotaTujuan',e.target.value)} placeholder="Dinas PU Provinsi …" className={inputCls} />

        </FCard>

        {/* Dokumen */}
        <FCard title="📋 Kelengkapan Dokumen">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">

                  </div>
                  {form.biaya.penginapan.length > 1 && (
                    <button type="button" onClick={() => set('biaya.penginapan', form.biaya.penginapan.filter((_,j)=>j!==i))}
                      className="p-1.5 text-red-400 hover:bg-red-50 rounded-lg transition flex-shrink-0">

                </div>

            <div className="flex items-center justify-between">

                      }} placeholder="Keterangan"
                        className="flex-1 bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-300" />

  const total  = calcTotal(trip.biaya);
  const dokOk  = Object.values(trip.dokumen).filter(Boolean).length;
  const dokAll = Object.keys(trip.dokumen).length;

  const sections = [
    {
      no:1, icon:'🚗', title:'Biaya Transportasi Pergi',
      rows:[ { label:'Taksi / Bensin', val:trip.biaya?.transportasiPergi?.taksi, bukti:'Print Bukti' }, { label:'Tol Pergi', val:trip.biaya?.transportasiPergi?.tol, bukti:'' } ],

      rows:[ { label:'Taksi / Bensin', val:trip.biaya?.transportasiPulang?.taksi, bukti:'Print Bukti' }, { label:'Tol Pulang', val:trip.biaya?.transportasiPulang?.tol, bukti:'' } ],
      sub:(+trip.biaya?.transportasiPulang?.taksi||0)+(+trip.biaya?.transportasiPulang?.tol||0),
    },
    {
      no:3, icon:'🏨', title:'Biaya Penginapan',
      rows:(trip.biaya?.penginapan||[]).map((v,i)=>({ label:HARI[i]||`Hari ke-${i+1}`, val:v, bukti:'Print Bukti' })),
      sub:(trip.biaya?.penginapan||[]).reduce((s,v)=>s+(+v||0),0),

    {
      no:4, icon:'✈️', title:'Biaya Tiket Bus / Pesawat',
      rows:[ { label:'Harga Pergi', val:trip.biaya?.tiket?.pergi, bukti:'Print Bukti' }, { label:'Harga Pulang', val:trip.biaya?.tiket?.pulang, bukti:'Print Bukti' } ],
      sub:(+trip.biaya?.tiket?.pergi||0)+(+trip.biaya?.tiket?.pulang||0),
    },
    ...(trip.biaya?.tambahanLain?.length ? [{
      no:5, icon:'💼', title:'Biaya Lain-lain',
      rows:trip.biaya.tambahanLain.map(t=>({ label:t.keterangan, val:t.jumlah, bukti:'' })),
      sub:trip.biaya.tambahanLain.reduce((s,t)=>s+(+t.jumlah||0),0),
    }] : []),
  ];

  return (
    <div className="animate-slidein max-w-2xl space-y-4 pb-10 print-area">
      {/* Toolbar */}
      <div className="no-print flex items-center justify-between mb-2">
        <div className="flex items-center gap-3">
          <button onClick={() => go({ name:'list' })}
            className="p-2 bg-white border border-gray-200 hover:bg-gray-100 rounded-xl text-gray-500 transition shadow-sm">
            <I.ArrowLeft c="w-4 h-4" />
          </button>
          <h1 className="text-xl font-bold text-gray-800">Detail Perjalanan Dinas</h1>
        </div>
        <div className="flex gap-2">
          <button onClick={() => window.print()}
            className="inline-flex items-center gap-2 bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 text-sm font-medium px-4 py-2 rounded-xl transition shadow-sm">
            <I.Print c="w-4 h-4" /> Print
          </button>
          <button onClick={() => go({ name:'form', id:trip.id })}
            className="inline-flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-semibold px-4 py-2 rounded-xl transition shadow-md shadow-sky-200">
            <I.Edit c="w-4 h-4" /> Edit
          </button>
        </div>
      </div>

      {/* Header */}
      <div className="card p-6 bg-gradient-to-br from-sky-50 to-indigo-50 border-sky-200 shadow-sm">
        <div className="text-center mb-5">
          <div className="font-extrabold text-gray-800 tracking-wide">KELENGKAPAN BERKAS PERJALANAN DINAS</div>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
          {[
            { Icon:I.User,     label:'Nama',    val:trip.nama },
            { Icon:I.Calendar, label:'Periode', val:getPeriode(trip) },
            { Icon:I.MapPin,   label:'Tujuan',  val:trip.kotaTujuan },
          ].map(({ Icon, label, val }) => (
            <div key={label} className="flex items-start gap-2">
              <span className="no-print"><Icon c="w-4 h-4 text-sky-500 mt-0.5 flex-shrink-0" /></span>
              <div>
                <div className="text-[10px] text-gray-400 uppercase tracking-wide">{label}</div>
                <div className="text-sm font-semibold text-gray-700">{val}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="no-print flex items-center justify-between pt-3 border-t border-sky-200">
          <div className="text-xs text-gray-500">
            Dokumen: <span className={dokOk===dokAll ? 'text-emerald-600 font-bold' : 'text-amber-600 font-bold'}>{dokOk}/{dokAll} lengkap</span>
          </div>
          <Badge s={trip.status} />
        </div>
      </div>

      {/* Dokumen */}
      <div className="card p-5 shadow-sm">
        <h3 className="font-semibold text-gray-700 text-sm mb-4 flex items-center gap-2 pb-3 border-b border-gray-100">
          <span className="no-print"><I.File c="w-4 h-4 text-sky-500" /></span> Kelengkapan Dokumen
        </h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
          {[['L','Perjalanan Dinas'],['R','Bukti Perjalanan']].map(([side,heading]) => (
            <div key={side}>
              <div className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">{heading}</div>
              <div className="space-y-2">
                {DOK_ITEMS.filter(d=>d.side===side).map(dok => (
                  <div key={dok.key} className="flex items-center gap-2.5">
                    <div className={`no-print w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0
                      ${trip.dokumen[dok.key] ? 'bg-emerald-500 shadow-sm shadow-emerald-200' : 'bg-gray-100 ring-1 ring-gray-200'}`}>
                      {trip.dokumen[dok.key]
                        ? <I.Check c="w-3 h-3 text-white" />
                        : <I.X c="w-3 h-3 text-gray-400" />}
                    </div>
                    <span className="print-only font-bold text-gray-700" style={{fontSize:'9pt'}}>
                      {trip.dokumen[dok.key] ? '[ ✓ ]' : '[ X ]'}
                    </span>
                    <span className="text-sm text-gray-700">
                      {dok.label}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Biaya */}
      <div className="card p-5 shadow-sm">
        <h3 className="font-semibold text-gray-700 text-sm mb-4 flex items-center gap-2 pb-3 border-b border-gray-100">
          <span className="no-print"><I.Wallet c="w-4 h-4 text-sky-500" /></span> Rincian Biaya
        </h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b border-gray-200">
                <th className="text-left text-[11px] text-gray-400 pb-2 w-7 font-semibold">No</th>
                <th className="text-left text-[11px] text-gray-400 pb-2 font-semibold">Perincian Biaya</th>
                <th className="text-right text-[11px] text-gray-400 pb-2 font-semibold">Jumlah</th>
                <th className="text-right text-[11px] text-gray-400 pb-2 font-semibold pl-4 hidden sm:table-cell">Bukti Dukung</th>
              </tr>
            </thead>
            <tbody>
              {sections.map(sec => (
                <React.Fragment key={sec.no}>
                  <tr className="bg-gray-50">
                    <td className="py-2.5 pl-1 text-gray-500 font-bold align-top rounded-l">{sec.no}</td>
                    <td colSpan={3} className="py-2.5 rounded-r">
                      <div className="font-semibold text-gray-700"><span className="emoji-icon">{sec.icon} </span>{sec.title}</div>
                      <div className="text-xs text-gray-400 mt-0.5 pl-1">Total: <span className="text-sky-600 font-semibold">{rp(sec.sub)}</span></div>
                    </td>
                  </tr>
                  {sec.rows.filter(r => r.val > 0).map((row, ri) => (
                    <tr key={ri} className="border-t border-gray-100">
                      <td></td>
                      <td className="py-1.5 pl-5 text-gray-500 text-xs">— {row.label}</td>
                      <td className="py-1.5 text-right text-gray-600 text-xs font-medium">{rp(row.val)}</td>
                      <td className="py-1.5 text-right text-sky-400 text-xs pl-4 hidden sm:table-cell">{row.bukti}</td>
                    </tr>
                  ))}
                </React.Fragment>
              ))}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-sky-300">
                <td colSpan={2} className="pt-4 pb-2 font-bold text-gray-800">TOTAL BIAYA PERJALANAN DINAS</td>
                <td className="pt-4 pb-2 text-right font-extrabold text-xl text-sky-600">{rp(total)}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* Catatan */}
      {trip.catatan && (
        <div className="no-print card p-5 shadow-sm text-sm">
          <div className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Catatan</div>
          <div className="text-gray-600">{trip.catatan}</div>
        </div>
      )}

      {/* Tanda tangan */}
      <div className="card p-5 shadow-sm">
        <div className="flex justify-end">
          <div className="text-center min-w-52">
            <div className="text-sm text-gray-500 mb-14">Jakarta, {getPeriode(trip)}</div>
            <div className="text-xs text-gray-400 mb-1">Pelaksana Perjalanan Dinas</div>
            <div className="border-t border-gray-300 pt-1 text-sm font-semibold text-gray-700">({trip.nama})</div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── APP ── */
const App = () => {
  const [data,    setData]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [fbError, setFbError] = useState(null);
  const [page,    setPage]    = useState({ name:'dashboard' });

  useEffect(() => {
    /* fallback: Firebase belum dikonfigurasi → pakai localStorage */
    if (!window.__db) {
      try { const s = localStorage.getItem('pfid_v1'); setData(s ? JSON.parse(s) : SEED); }
      catch { setData(SEED); }
      setLoading(false);
      return;
    }

    const db = window.__db;
    const unsub = db.collection('trips').orderBy('createdAt','asc').onSnapshot(
      snap => {
        if (snap.empty) SEED.forEach(t => db.collection('trips').doc(t.id).set(t));
        setData(snap.docs.map(d => d.data()));
        setLoading(false);
        setFbError(null);
      },
      err => { console.error('Firestore:', err); setFbError(err.message); setLoading(false); }
    );
    return () => unsub();
  }, []);

  /* tulis ke Firestore ATAU localStorage jika belum dikonfigurasi */
  const onSave = (trip) => {
    if (window.__db) {
      window.__db.collection('trips').doc(trip.id).set(trip);
    } else {
      setData(prev => {
        const idx = prev.findIndex(d => d.id === trip.id);
        const next = idx >= 0 ? prev.map((d,i) => i===idx ? trip : d) : [...prev, trip];
        localStorage.setItem('pfid_v1', JSON.stringify(next));
        return next;
      });
    }
  };

  const onDelete = (id) => {
    if (window.__db) {
      window.__db.collection('trips').doc(id).delete();
    } else {
      setData(prev => {
        const next = prev.filter(d => d.id !== id);
        localStorage.setItem('pfid_v1', JSON.stringify(next));
        return next;
      });
    }
  };

  const go = (p) => setPage(p);

  const content = () => {
    switch (page.name) {
      case 'dashboard': return <Dashboard  data={data} go={go} />;
      case 'list':      return <TripList   data={data} go={go} onDelete={onDelete} />;
      case 'form':      return <TripForm   data={data} id={page.id} onSave={onSave} go={go} />;
      case 'detail':    return <TripDetail data={data} id={page.id} go={go} />;
      default:          return <Dashboard  data={data} go={go} />;
    }
  };

  return (
    <div className="flex min-h-screen" style={{background:'#f1f5f9'}}>
      <Sidebar page={page} go={go} />
      <main className="ml-56 flex-1 p-6 lg:p-8 overflow-x-hidden min-h-screen">
        {/* banner status Firebase */}
        {window.__db && !loading && !fbError && (
          <div className="no-print mb-4 flex items-center gap-2 bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-medium px-3 py-2 rounded-xl">
            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse flex-shrink-0" />
            Tersinkron ke Firebase — semua perubahan langsung terlihat oleh semua pengguna
          </div>
        )}
        {!window.__db && !loading && (
          <div className="no-print mb-4 flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-700 text-xs font-medium px-3 py-2 rounded-xl">
            <span className="w-2 h-2 rounded-full bg-amber-400 flex-shrink-0" />
            Mode lokal — isi Firebase config di &lt;script&gt; untuk sinkronisasi antar pengguna
          </div>
        )}
        {fbError && (
          <div className="no-print mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-xs font-medium px-3 py-2 rounded-xl">
            <span className="w-2 h-2 rounded-full bg-red-500 flex-shrink-0" />
            Firebase error: {fbError}
          </div>
        )}
        {loading ? (
          <div className="flex items-center justify-center min-h-64">
            <div className="text-center">
              <I.Plane c="w-10 h-10 mx-auto text-sky-400 animate-float mb-3" />
              <div className="text-sm text-gray-400 font-medium">Menghubungkan ke Firebase…</div>
            </div>
          </div>
        ) : content()}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
